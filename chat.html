<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anarchroom - Chat</title>
  <link rel="stylesheet" href="anarcroom.css">
</head>
<body>

<div class="container">

  <div class="header">
    <div class="header-logo">
      <img src="374762a1-c03d-478c-acde-97469eea0fa3.png" alt="Logo Anarchroom">
    </div>
    <h1>⚡ ANARCHROOM ⚡</h1>
    <p class="tagline">Chat Livre • Anónimo • Sem Registo</p>
  </div>

  <!-- ENTRAR -->
  <div id="joinSection" class="section">
    <h2>Entrar</h2>

    <div class="form-group">
      <label for="user">Seu nome</label>
      <input type="text" id="user" placeholder="Escolha um nome" autocomplete="off">
    </div>

    <button onclick="entrar()" style="width:100%;">⊙ Entrar »»»»»»»»⊙</button>
  </div>

  <!-- CHAT -->
  <div id="chat" style="display:none;">

    <div class="status">
      <span id="userDisplay"></span>
    </div>

    <div id="messages"></div>

    <div class="section">
      <div class="form-group">
        <label for="msg">Mensagem</label>
        <div class="input-wrapper">
          <input id="msg" type="text" placeholder="Escreva aqui…" autocomplete="off">
          <button onclick="enviar()">⊙ Enviar »»»»»»⊙</button>
        </div>
      </div>
    </div>

    <div class="section" style="text-align:center;">
      <a href="index.html">← Sair</a>
    </div>

  </div>

</div>

<script>
let username = '';
const ROOM = new URLSearchParams(location.search).get('room') || 'GLOBAL';
let socket = null;

function formatTime() {
  const d = new Date();
  return d.toLocaleTimeString();
}

function adicionarMensagem(user, msg) {
  const container = document.getElementById('messages');
  const p = document.createElement('p');
  p.innerHTML = `<span class="message-time">[${formatTime()}]</span> <strong>${user}:</strong> ${msg}`;
  container.appendChild(p);
  container.scrollTop = container.scrollHeight;
}

// Load socket.io client dynamically from same host on port 3000
(function initSocket() {
  const WS_URL = `${location.protocol}//${location.hostname}:3000`;
  const script = document.createElement('script');
  script.src = `${WS_URL}/socket.io/socket.io.js`;
  script.onload = () => {
    try {
      socket = io(WS_URL);
      socket.on('connect', () => {
        console.log('Connected to socket server');
        if (username) socket.emit('join', ROOM);
      });
      socket.on('chat message', data => {
        // data: { user, msg }
        adicionarMensagem(data.user, data.msg);
      });
    } catch (e) {
      console.warn('socket.io client load error', e);
    }
  };
  script.onerror = () => {
    console.warn('Could not load socket.io client from', script.src);
  };
  document.head.appendChild(script);
})();

function entrar() {
  const input = document.getElementById('user');
  username = input.value.trim();
  if (!username) {
    alert('Escolha um nome!');
    return;
  }

  document.getElementById('joinSection').style.display = 'none';
  document.getElementById('chat').style.display = 'block';
  document.getElementById('userDisplay').textContent = '👤 ' + username + ' — Sala: ' + ROOM;

  adicionarMensagem('Sistema', `${username} entrou no chat`);

  if (socket && socket.connected) {
    socket.emit('join', ROOM);
  }
}

function enviar() {
  const msgEl = document.getElementById('msg');
  const msg = msgEl.value.trim();
  if (!msg) return;

  // show immediately
  adicionarMensagem(username, msg);

  if (socket && socket.connected) {
    socket.emit('chat message', { room: ROOM, user: username, msg });
  }

  msgEl.value = '';
}

document.getElementById('msg').addEventListener('keydown', e => {
  if (e.key === 'Enter') enviar();
});
</script>

</body>
</html>
